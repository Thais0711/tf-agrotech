{% extends "base.html" %}{% block conteudo %}<section class="content"><div class="title"><h2>👤 Novo usuário da fazenda</h2><p>Crie login para funcionário, financeiro ou administrador.</p></div><div class="box">{% with mensagens = get_flashed_messages() %}{% if mensagens %}{% for msg in mensagens %}<div class="message">{{ msg }}</div>{% endfor %}{% endif %}{% endwith %}<form method="POST" class="form"><input class="input" name="nome" placeholder="Nome completo" required><input class="input" type="email" name="email" placeholder="E-mail" required><input class="input" type="password" name="senha" placeholder="Senha" required><select name="perfil"><option>Administradora</option><option>Financeiro</option><option>Funcionário</option><option>Produtor</option></select><button class="btn">Criar usuário</button></form></div></section>{% endblock %}
