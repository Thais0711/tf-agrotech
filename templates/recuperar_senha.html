<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Recuperar Senha</title><link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"></head><body class="login-page"><div class="login-card"><h1>Recuperar <span>Senha</span></h1><p>Digite seu e-mail e uma nova senha.</p>{% with mensagens = get_flashed_messages() %}{% if mensagens %}{% for msg in mensagens %}<div class="message">{{ msg }}</div>{% endfor %}{% endif %}{% endwith %}<form method="POST"><input class="input" type="email" name="email" placeholder="E-mail cadastrado" required><input class="input" type="password" name="nova_senha" placeholder="Nova senha" required><button class="btn" style="width:100%" type="submit">Alterar Senha</button></form><div class="login-links"><a href="/login">Voltar ao login</a></div></div></body></html>
